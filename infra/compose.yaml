# infra/compose.yaml
#
# Stack de producción: 2 contenedores (db, app) detrás de Plesk.
# Plesk (en el host del VPS) hace TLS y reverse-proxy a http://127.0.0.1:3000.
# Ningún contenedor expone puertos al exterior — todo bindea a 127.0.0.1.
#
# En local solo se levanta `db`; la app va con `npm run dev`.
version: "3.9"

services:
  db:
    image: docker.io/postgres:16-alpine
    container_name: porra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: porra
      # Se exige siempre (tanto en local como en prod) que el .env defina un
      # POSTGRES_PASSWORD. Genéralo con `openssl rand -base64 24` (ver deploy-vps).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido en .env}
      POSTGRES_DB: porra
    volumes:
      - porra-db-data:/var/lib/postgresql/data
      - ./scripts/backups:/backups
    ports:
      - "127.0.0.1:5432:5432"   # solo localhost; en VPS no expuesto fuera
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porra"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # En producción deploy.sh hace `podman pull` de la imagen etiquetada con el
    # SHA (IMAGE_TAG) y `up -d` la usa sin reconstruir. En local, `podman-compose
    # build` (o `up --build`) usa el bloque build de abajo.
    image: ghcr.io/infasyskey/porra-app:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/Containerfile
    container_name: porra-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://porra:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido en .env}@db:5432/porra
      APP_URL: ${APP_URL}
      COOKIE_SECRET: ${COOKIE_SECRET}
      TOURNAMENT_START_AT: "2026-06-11T17:00:00Z"
    ports:
      # 3000 publicado SOLO en localhost del host. Plesk (en el host) hace
      # reverse-proxy hacia aquí. Si bindeas a 0.0.0.0, abres el backend a
      # internet saltándote Plesk y los logs.
      - "127.0.0.1:3000:3000"

volumes:
  porra-db-data:
